<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>CAD DSL House with Earthquake Simulation</title>
    <style>
        html, body {
            overflow: hidden;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
        #renderCanvas {
            width: 100%;
            height: 100%;
            touch-action: none;
        }
        #controls {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255, 255, 255, 0.7);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/cannon.js"></script>
    <script src="https://cdn.babylonjs.com/materialsLibrary/babylonjs.materials.min.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <div id="controls">
        <button onclick="startEarthquake()">Start Earthquake</button>
        <button onclick="stopEarthquake()">Stop Earthquake</button>
        <div>
            <label>Intensity:</label>
            <input type="range" min="0.1" max="2" step="0.1" value="0.5" id="intensitySlider" 
                   onchange="updateEarthquakeIntensity()">
        </div>
    </div>

    <script type="module">
        import { BabylonRenderer } from './dist/engine/babylonRenderer.js';
        import { PhysicsSimulator } from './dist/engine/physics.js';

        async function initScene() {
            try {
                console.log("Initializing scene...");
                // Initialize the engine
                const canvas = document.getElementById("renderCanvas");
                const engine = new BABYLON.Engine(canvas, true);
                window.engine = engine;

                // Create scene with dark grey background
                const scene = new BABYLON.Scene(engine);
                scene.clearColor = new BABYLON.Color3(0.2, 0.2, 0.2); // Dark grey background
                window.scene = scene;

                // Camera setup
                const camera = new BABYLON.ArcRotateCamera("camera", 
                    Math.PI / 3, // alpha
                    Math.PI / 3, // beta
                    25, // radius
                    new BABYLON.Vector3(0, 5, 0), // target
                    scene
                );
                camera.attachControl(canvas, true);
                camera.lowerRadiusLimit = 10;
                camera.upperRadiusLimit = 50;
                camera.wheelPrecision = 50; // Slower zoom
                camera.panningSensibility = 50; // Slower panning
                
                // Set initial camera position for better view of simple house
                camera.setPosition(new BABYLON.Vector3(12, 8, 12));
                camera.setTarget(new BABYLON.Vector3(0, 2, 0));

                // Light - adjusted for dark background
                const light = new BABYLON.HemisphericLight("light", 
                    new BABYLON.Vector3(0, 1, 0), 
                    scene
                );
                light.intensity = 1.0; // Increased intensity for dark background
                light.groundColor = new BABYLON.Color3(0.2, 0.2, 0.2); // Ambient light for better visibility

                // Initialize physics first and wait for CANNON to be ready
                await new Promise(resolve => {
                    const checkCannon = () => {
                        if (typeof CANNON !== 'undefined') {
                            resolve(true);
                        } else {
                            setTimeout(checkCannon, 100);
                        }
                    };
                    checkCannon();
                });

                console.log("Creating PhysicsSimulator...");
                window.physicsSimulator = new PhysicsSimulator(scene);
                
                // Wait for physics to be ready
                await new Promise(resolve => {
                    const checkPhysics = () => {
                        if (window.physicsSimulator.isPhysicsReady()) {
                            resolve(true);
                        } else {
                            setTimeout(checkPhysics, 100);
                        }
                    };
                    checkPhysics();
                });

                // Enable debug layer
                scene.debugLayer.show({
                    embedMode: true,
                    overlay: true
                });

                console.log("Creating BabylonRenderer...");
                window.renderer = new BabylonRenderer(scene);

                // Position camera for better view
                camera.setPosition(new BABYLON.Vector3(20, 15, 20));
                camera.setTarget(BABYLON.Vector3.Zero());

                // Create simple house
                console.log("Creating house...");
                const house = window.renderer.render({
                    type: "house",
                    properties: {
                        width: 6,
                        height: 4,
                        depth: 8,
                        wallThickness: 0.2,
                        materials: {
                            walls: "white",
                            roof: "red",
                            foundation: "gray"
                        }
                    }
                });

                // Render loop
                engine.runRenderLoop(function() {
                    scene.render();
                });

                // Handle window resize
                window.addEventListener("resize", function() {
                    engine.resize();
                });

                console.log("Scene initialized successfully");
            } catch (error) {
                console.error("Error initializing scene:", error);
            }
        }

        // Initialize everything when the page loads
        window.addEventListener('DOMContentLoaded', initScene);

        // Expose functions for controls
        window.startEarthquake = function() {
            if (window.physicsSimulator) {
                console.log("Starting earthquake...");
                window.physicsSimulator.startEarthquake(10000);
            } else {
                console.error("PhysicsSimulator not initialized");
            }
        };

        window.stopEarthquake = function() {
            if (window.physicsSimulator) {
                console.log("Stopping earthquake...");
                window.physicsSimulator.stopEarthquake();
            } else {
                console.error("PhysicsSimulator not initialized");
            }
        };

        window.updateEarthquakeIntensity = function() {
            if (window.physicsSimulator) {
                const intensity = document.getElementById("intensitySlider").value;
                console.log("Updating earthquake intensity to:", intensity);
                window.physicsSimulator.setEarthquakeIntensity(parseFloat(intensity), 2);
            } else {
                console.error("PhysicsSimulator not initialized");
            }
        };
    </script>
</body>
</html>
